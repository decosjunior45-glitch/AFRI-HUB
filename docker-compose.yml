version: "3.9"
services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - MONGODB_URI=mongodb://mongo:27017/afrihub
      - MONGODB_DB=afrihub
    depends_on:
      - mongo
    networks:
      - afrihub-network

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:4000/api
    depends_on:
      - backend
    networks:
      - afrihub-network

  mongo:
    image: mongo:8.0
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    networks:
      - afrihub-network

volumes:
  mongo-data:

networks:
  afrihub-network:
    driver: bridge
